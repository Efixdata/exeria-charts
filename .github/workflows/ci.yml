name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Build, test & verify packages
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build publishable packages
        run: npm run build:packages

      - name: Unit tests
        run: npm run test:mobile

      - name: Verify release packages
        run: npm run verify:release

  quality:
    name: Lint (advisory)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Non-blocking: surfaces existing lint debt without failing the pipeline.
      # Tighten to a required check once the backlog is cleared.
      - name: Lint packages
        run: npm run lint:packages
        continue-on-error: true
